{% extends "base.html" %}

{% block title %}Recuperar Senha - LojaFácil{% endblock %}

{% block content %}
<div class="auth-simple">
    <div class="form-card recovery-card">
        <div class="recovery-icon">
            <i class="fas fa-key"></i>
        </div>

        <h1>Recuperar senha</h1>
        <p class="section-subtitle">
            Informe o e-mail cadastrado para iniciar a redefinição de senha.
        </p>

        <form method="POST" class="login-form">
            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope"></i> E-mail cadastrado
                </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="seu@email.com"
                    required
                    autocomplete="email"
                >
            </div>

            <button type="submit" class="btn full">
                <i class="fas fa-paper-plane"></i> Continuar
            </button>
        </form>

        <div class="form-footer">
            Lembrou a senha? <a href="{{ url_for('login') }}">Voltar ao login</a>
        </div>
    </div>
</div>

<style>
    .auth-simple {
        min-height: 62vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 36px;
    }

    .recovery-card {
        max-width: 460px;
        width: 100%;
        text-align: left;
    }

    .recovery-icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #dbeafe;
        color: var(--primary);
        font-size: 26px;
        margin-bottom: 18px;
    }

    .recovery-card h1 {
        margin: 0 0 8px;
    }

    .form-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 32px;
    }

    .login-form {
        display: flex;
        flex-direction: column;
        gap: 18px;
        margin-top: 24px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .form-group label {
        font-weight: 700;
        color: #334155;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .form-group input {
        padding: 13px 14px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #fff;
        font-size: 15px;
    }

    .form-footer {
        text-align: center;
        margin-top: 22px;
        font-size: 14px;
        font-weight: 700;
    }

    .form-footer a {
        color: var(--primary);
        text-decoration: none;
    }
</style>
{% endblock %}
