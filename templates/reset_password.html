{% extends "base.html" %}

{% block title %}Nova Senha - LojaFácil{% endblock %}

{% block content %}
<div class="auth-simple">
    <div class="form-card recovery-card">
        <div class="recovery-icon">
            <i class="fas fa-lock"></i>
        </div>

        <h1>Definir nova senha</h1>
        <p class="section-subtitle">
            Redefinindo senha para <strong>{{ email }}</strong>.
        </p>

        <form method="POST" class="login-form">
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Nova senha
                </label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    minlength="8"
                    required
                    autocomplete="new-password"
                >
            </div>

            <div class="form-group">
                <label for="confirm_password">
                    <i class="fas fa-check-circle"></i> Confirmar nova senha
                </label>
                <input
                    type="password"
                    id="confirm_password"
                    name="confirm_password"
                    minlength="8"
                    required
                    autocomplete="new-password"
                >
            </div>

            <button type="submit" class="btn full">
                <i class="fas fa-save"></i> Salvar nova senha
            </button>
        </form>
    </div>
</div>

<style>
    .auth-simple {
        min-height: 62vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 36px;
    }

    .recovery-card {
        max-width: 460px;
        width: 100%;
    }

    .recovery-icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #dcfce7;
        color: #166534;
        font-size: 26px;
        margin-bottom: 18px;
    }

    .recovery-card h1 {
        margin: 0 0 8px;
    }

    .form-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 32px;
    }

    .login-form {
        display: flex;
        flex-direction: column;
        gap: 18px;
        margin-top: 24px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .form-group label {
        font-weight: 700;
        color: #334155;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .form-group input {
        padding: 13px 14px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #fff;
        font-size: 15px;
    }
</style>
{% endblock %}
