{% extends "base.html" %}

{% block title %}Endereço{% endblock %}

{% block content %}
<div class="checkout-steps">
    <div class="progress-step">Carrinho</div>
    <div class="progress-step active">Endereço</div>
    <div class="progress-step">Entrega</div>
    <div class="progress-step">Pagamento</div>
    <div class="progress-step">Conclusão</div>
</div>

<h1 class="page-title">Endereço de Entrega</h1>
<h2 class="section-subtitle">Informe os dados para entrega do seu pedido.</h2>

<div class="checkout-grid">
    <div class="checkout-form">
        <form method="POST">
            <h2>Dados do Cliente</h2>

            <label for="customer_name">Nome completo</label>
            <input type="text" id="customer_name" name="customer_name" required>

            <label for="customer_email">E-mail</label>
            <input type="email" id="customer_email" name="customer_email" required>

            <div class="form-group">
                <label for="cep">CEP</label>
                <input type="text" id="cep" name="cep" maxlength="9" placeholder="00000-000" required>
            </div>

            <div class="form-group">
                <label for="rua">Rua</label>
                <input type="text" id="rua" name="rua" required>
            </div>

            <div class="form-group">
                <label for="numero">Número</label>
                <input type="text" id="numero" name="numero" required>
            </div>

            <div class="form-group">
                <label for="bairro">Bairro</label>
                <input type="text" id="bairro" name="bairro" required>
            </div>

            <div class="form-group">
                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" name="cidade" required>
            </div>

            <div class="form-group">
                <label for="estado">Estado</label>
                <input type="text" id="estado" name="estado" required>
            </div>

            <div class="form-group">
                <label for="complemento">Complemento</label>
                <input type="text" id="complemento" name="complemento">
            </div>

            <button type="submit" class="btn full">Continuar para entrega</button>
        </form>
    </div>
</div>

<script>
    const cepInput = document.getElementById("cep");

    cepInput.addEventListener("input", function () {
        let value = this.value.replace(/\D/g, "").substring(0, 8);
        if (value.length > 5) {
            value = value.substring(0, 5) + "-" + value.substring(5);
        }
        this.value = value;
    });

    cepInput.addEventListener("blur", function () {
        let cep = this.value.replace(/\D/g, "");

        if (cep.length !== 8) return;

        fetch(`https://viacep.com.br/ws/${cep}/json/`)
            .then(response => response.json())
            .then(data => {
                if (data.erro) {
                    alert("CEP não encontrado.");
                    return;
                }

                document.getElementById("rua").value = data.logradouro || "";
                document.getElementById("bairro").value = data.bairro || "";
                document.getElementById("cidade").value = data.localidade || "";
                document.getElementById("estado").value = data.uf || "";
            })
            .catch(() => {
                alert("Erro ao buscar o CEP.");
            });
    });
</script>
{% endblock %}
